name: Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feat/**

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Build demo
        run: npm run demo:build

      - name: Validate package
        run: npm run publint
